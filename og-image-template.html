<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #F5F3EC;
    font-family: 'Arial Black', 'Archivo Black', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Grid lines */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,0,0,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.06) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* Lime accent block */
  .accent-block {
    position: absolute;
    top: -20px;
    right: 180px;
    width: 260px;
    height: 340px;
    background: #C6F24E;
    border: 3px solid #111;
    transform: rotate(8deg);
    box-shadow: 8px 8px 0 0 #111;
  }

  /* Purple block */
  .purple-block {
    position: absolute;
    bottom: 60px;
    right: 80px;
    width: 120px;
    height: 120px;
    background: #2D1B69;
    border: 3px solid #111;
    transform: rotate(-12deg);
  }

  /* Red dot */
  .red-dot {
    position: absolute;
    top: 60px;
    left: 340px;
    width: 18px;
    height: 18px;
    background: #FF5A36;
    border-radius: 50%;
    border: 2px solid #111;
  }

  /* Main content */
  .content {
    position: absolute;
    top: 0;
    left: 0;
    width: 720px;
    height: 630px;
    padding: 72px 80px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 0;
  }

  .tag {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    font-family: 'Courier New', monospace;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #111;
    margin-bottom: 28px;
  }

  .tag-dot {
    width: 10px;
    height: 10px;
    background: #FF5A36;
    border-radius: 50%;
    border: 2px solid #111;
  }

  .name {
    font-size: 82px;
    font-weight: 900;
    line-height: 0.92;
    color: #111;
    letter-spacing: -0.03em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .name .stroke {
    -webkit-text-stroke: 3px #111;
    color: transparent;
  }

  .role {
    font-size: 18px;
    font-weight: 700;
    color: #111;
    font-family: 'Courier New', monospace;
    letter-spacing: 0.04em;
    border-left: 4px solid #C6F24E;
    padding-left: 14px;
    margin-bottom: 32px;
    line-height: 1.5;
  }

  .meta {
    display: flex;
    gap: 24px;
  }

  .meta-cell {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .meta-k {
    font-size: 22px;
    font-weight: 900;
    color: #111;
  }

  .meta-v {
    font-size: 11px;
    font-family: 'Courier New', monospace;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* Logo mark */
  .logo {
    position: absolute;
    bottom: 48px;
    left: 80px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-mark {
    width: 40px;
    height: 40px;
    background: #C6F24E;
    border: 3px solid #111;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 900;
    color: #111;
    font-family: 'Arial Black', sans-serif;
  }

  .logo-text {
    font-size: 18px;
    font-weight: 900;
    color: #111;
    text-transform: uppercase;
    letter-spacing: -0.01em;
  }

  .logo-dot {
    color: #888;
  }

  /* URL chip */
  .url-chip {
    position: absolute;
    bottom: 52px;
    right: 80px;
    background: #111;
    color: #C6F24E;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    font-weight: 700;
    padding: 8px 16px;
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="accent-block"></div>
  <div class="purple-block"></div>

  <div class="content">
    <div class="tag">
      <div class="tag-dot"></div>
      Available for new projects
    </div>
    <div class="name">
      David<br>
      <span class="stroke">Vique</span>
    </div>
    <div class="role">
      Full-Stack Developer &amp; Engineer<br>
      Ecuador · AWS · React · AI
    </div>
    <div class="meta">
      <div class="meta-cell">
        <span class="meta-k">5+</span>
        <span class="meta-v">yrs shipping</span>
      </div>
      <div class="meta-cell">
        <span class="meta-k">9+</span>
        <span class="meta-v">products live</span>
      </div>
      <div class="meta-cell">
        <span class="meta-k">1</span>
        <span class="meta-v">springer paper</span>
      </div>
    </div>
  </div>

  <div class="logo">
    <div class="logo-mark">D</div>
    <div class="logo-text">David<span class="logo-dot">.dev</span></div>
  </div>

  <div class="url-chip">david-dev-portfolio-2026.vercel.app</div>
</body>
</html>
